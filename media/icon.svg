  <rect x="60" y="20" width="8" height="16" fill="#3794ff"/>
  <circle cx="64" cy="16" r="6" fill="#ff6b6b"/>
  
  <!-- Ears/sides -->
  <rect x="20" y="50" width="12" height="20" rx="4" fill="#3794ff"/>
  <rect x="96" y="50" width="12" height="20" rx="4" fill="#3794ff"/>
  
