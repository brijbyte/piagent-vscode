<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#1e1e1e"/>
  
  <!-- Robot head -->
  <rect x="32" y="36" width="64" height="52" rx="8" fill="#3794ff"/>
  
  <!-- Eyes -->
  <circle cx="48" cy="58" r="8" fill="#1e1e1e"/>
  <circle cx="80" cy="58" r="8" fill="#1e1e1e"/>
  
  <!-- Eye highlights -->
  <circle cx="50" cy="56" r="3" fill="#fff"/>
  <circle cx="82" cy="56" r="3" fill="#fff"/>
  
  <!-- Mouth -->
  <rect x="44" y="72" width="40" height="6" rx="3" fill="#1e1e1e"/>
  
