name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: piagent-vscode
          path: '*.vsix'
